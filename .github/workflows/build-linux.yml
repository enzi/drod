name: Build DRODRPG Linux

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        config:
          - { name: "Release x64", arch: "x86_64", build: "release", flags: "-64 -release" }
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
    
    - name: Cache APT packages
      uses: actions/cache@v4
      with:
        path: |
          /var/cache/apt/archives
          /var/lib/apt/lists
        key: ${{ runner.os }}-apt-packages-v2
        restore-keys: |
          ${{ runner.os }}-apt-packages-
          ${{ runner.os }}-apt-
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          libssl-dev \
          libnghttp2-dev \
          zlib1g-dev \
          wget \
          unzip \
          pkg-config \
          git \
          libasound2-dev \
          libpulse-dev \
          libx11-dev \
          libxext-dev \
          libwayland-dev
        
        # Create symlink for json headers in expected location
        sudo ln -sf /usr/include/jsoncpp/json /usr/include/json
        
        # Create static-libs directory structure for dependencies
        mkdir -p drodrpg/Master/Linux/static-libs/lib
        mkdir -p drodrpg/Master/Linux/static-libs/include
    
    - name: Cache downloaded sources
      uses: actions/cache@v4
      with:
        path: drodrpg/Master/Linux/deps
        key: ${{ runner.os }}-sources-${{ hashFiles('drodrpg/Master/Linux/build-deps.sh') }}
        restore-keys: |
          ${{ runner.os }}-sources-
    
    - name: Cache static libraries  
      uses: actions/cache@v4
      with:
        path: drodrpg/Master/Linux/static-libs
        key: ${{ runner.os }}-static-libs-${{ matrix.config.arch }}-${{ hashFiles('drodrpg/Master/Linux/build-deps.sh') }}
        restore-keys: |
          ${{ runner.os }}-static-libs-${{ matrix.config.arch }}-
          ${{ runner.os }}-static-libs-
    
    - name: Build static dependencies
      working-directory: drodrpg/Master/Linux
      run: |
        chmod +x build-deps.sh
        ./build-deps.sh
        
        # Debug: List what's in static-libs
        echo "=== Static libraries built ==="
        ls -la static-libs/lib/ || echo "static-libs/lib directory not found"
    
    - name: Cache build objects
      uses: actions/cache@v4
      with:
        path: drodrpg/Master/Linux/builds
        key: ${{ runner.os }}-build-${{ matrix.config.build }}-${{ matrix.config.arch }}-${{ hashFiles('drodrpg/**/*.cpp', 'drodrpg/**/*.h', 'drodrpg/Master/Linux/ninjamaker') }}
        restore-keys: |
          ${{ runner.os }}-build-${{ matrix.config.build }}-${{ matrix.config.arch }}-
          ${{ runner.os }}-build-${{ matrix.config.build }}-
    
    - name: Show cache status
      run: |
        echo "=== Cache Status ==="
        echo "APT cache: $([ -d /var/cache/apt/archives ] && echo "exists" || echo "missing")"
        echo "Downloaded sources: $([ -d drodrpg/Master/Linux/deps ] && echo "$(ls drodrpg/Master/Linux/deps | wc -l) items" || echo "missing")"
        echo "Static libraries: $([ -d drodrpg/Master/Linux/static-libs ] && echo "exists" || echo "missing")"
        echo "Build objects: $([ -d drodrpg/Master/Linux/builds ] && echo "exists" || echo "missing")"
    
    - name: Generate ninja build files
      working-directory: drodrpg/Master/Linux
      run: |
        chmod +x ninjamaker
        ./ninjamaker ${{ matrix.config.flags }}
    
    - name: Build DRODRPG
      working-directory: drodrpg/Master/Linux
      run: |
        chmod +x build
        ./build
    
    - name: List build artifacts
      working-directory: drodrpg/Master/Linux
      run: |
        find builds/ -type f -executable -name "drod" -exec ls -la {} \;
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: drodrpg-linux-${{ matrix.config.arch }}-${{ matrix.config.build }}
        path: |
          drodrpg/Master/Linux/builds/*/drod
          drodrpg/Master/Linux/builds/*/*.dbg
        retention-days: 30
    
    - name: Create release archive
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      working-directory: drodrpg/Master/Linux
      run: |
        BUILD_DIR=$(find builds -name "drod" -type f | head -1 | xargs dirname)
        if [ -n "$BUILD_DIR" ]; then
          # Copy our built SDL2 shared lib into build dir
          cp static-libs/lib/libSDL2-2.0.so.0 "$BUILD_DIR/" || true

          cd "$BUILD_DIR"
          tar -czf "drodrpg-linux-${{ matrix.config.arch }}-${{ matrix.config.build }}.tar.gz" drod libSDL2-*.so.0
          mv "drodrpg-linux-${{ matrix.config.arch }}-${{ matrix.config.build }}.tar.gz" ../../
        fi
    
    - name: Upload release archive
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: actions/upload-artifact@v4
      with:
        name: drodrpg-linux-release-${{ matrix.config.arch }}-${{ matrix.config.build }}
        path: drodrpg/Master/Linux/drodrpg-linux-*.tar.gz
        retention-days: 90

  build-all-variants:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
    
    - name: Cache APT packages
      uses: actions/cache@v4
      with:
        path: |
          /var/cache/apt/archives
          /var/lib/apt/lists
        key: ${{ runner.os }}-apt-packages-v2
        restore-keys: |
          ${{ runner.os }}-apt-packages-
          ${{ runner.os }}-apt-
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          libssl-dev \
          libnghttp2-dev \
          zlib1g-dev \
          wget \
          unzip \
          pkg-config \
          git \
          libasound2-dev \
          libpulse-dev \
          libx11-dev \
          libxext-dev \
          libwayland-dev
        
        # Create symlink for json headers in expected location
        sudo ln -sf /usr/include/jsoncpp/json /usr/include/json
        
        # Create static-libs directory structure for dependencies
        mkdir -p drodrpg/Master/Linux/static-libs/lib
        mkdir -p drodrpg/Master/Linux/static-libs/include
    
    - name: Cache downloaded sources
      uses: actions/cache@v4
      with:
        path: drodrpg/Master/Linux/deps
        key: ${{ runner.os }}-sources-${{ hashFiles('drodrpg/Master/Linux/build-deps.sh') }}
        restore-keys: |
          ${{ runner.os }}-sources-
    
    - name: Cache static libraries  
      uses: actions/cache@v4
      with:
        path: drodrpg/Master/Linux/static-libs
        key: ${{ runner.os }}-static-libs-x86_64-${{ hashFiles('drodrpg/Master/Linux/build-deps.sh') }}
        restore-keys: |
          ${{ runner.os }}-static-libs-x86_64-
          ${{ runner.os }}-static-libs-
    
    - name: Cache build objects (all variants)
      uses: actions/cache@v4
      with:
        path: drodrpg/Master/Linux/builds
        key: ${{ runner.os }}-build-all-x86_64-${{ hashFiles('drodrpg/**/*.cpp', 'drodrpg/**/*.h', 'drodrpg/Master/Linux/ninjamaker') }}
        restore-keys: |
          ${{ runner.os }}-build-all-x86_64-
          ${{ runner.os }}-build-
    
    - name: Show cache status
      run: |
        echo "=== Cache Status ==="
        echo "APT cache: $([ -d /var/cache/apt/archives ] && echo "exists" || echo "missing")"
        echo "Downloaded sources: $([ -d drodrpg/Master/Linux/deps ] && echo "$(ls drodrpg/Master/Linux/deps | wc -l) items" || echo "missing")"
        echo "Static libraries: $([ -d drodrpg/Master/Linux/static-libs ] && echo "exists" || echo "missing")"
        echo "Build objects: $([ -d drodrpg/Master/Linux/builds ] && echo "exists" || echo "missing")"
    
    - name: Build static dependencies
      working-directory: drodrpg/Master/Linux
      run: |
        chmod +x build-deps.sh
        ./build-deps.sh
        
        # Debug: List what's in static-libs
        echo "=== Static libraries built ==="
        ls -la static-libs/lib/ || echo "static-libs/lib directory not found"
    
    - name: Build all variants
      working-directory: drodrpg/Master/Linux
      run: |
        chmod +x ninjamaker build
        
        # Build all main variants
        for build_flag in "-release" "-dev" "-beta"; do
          echo "Building with flags: -64 $build_flag"
          ./ninjamaker -64 $build_flag
          ./build
        done
    
    - name: Package all builds
      working-directory: drodrpg/Master/Linux
      run: |
        mkdir -p dist
        for build_dir in builds/*/; do
          if [ -f "$build_dir/drod" ]; then
            variant=$(basename "$build_dir")
            # Copy our built SDL2 lib into each build dir  
            cp static-libs/lib/libSDL2-2.0.so.0 "$build_dir/" || true

            cd "$build_dir"
            tar -czf "../../dist/drodrpg-linux-${variant}.tar.gz" drod *.dbg libSDL2-*.so.0
            cd - > /dev/null
          fi
        done
    
    - name: Upload all variants
      uses: actions/upload-artifact@v4
      with:
        name: drodrpg-linux-all-variants
        path: drodrpg/Master/Linux/dist/
        retention-days: 30
